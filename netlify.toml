[build]
  command = "npm install && bundle exec jekyll build && node scripts/fingerprint-css.js"
  publish = "_site"

[build.environment]
  RUBY_VERSION = "3.4.2"
  NODE_VERSION = "24"
  JEKYLL_ENV = "production"

# Security headers applied to every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Fingerprinted CSS gets a 1-year immutable cache — the hash in the filename
# guarantees a new URL on every change, so browsers never serve stale CSS.
[[headers]]
  for = "/assets/css/main.*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Other static assets: 1-day cache (not immutable — filenames don't change).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
